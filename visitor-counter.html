<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visitor Counter Embed</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px;
    }

    .number {
      font-size: clamp(28px, 7vw, 72px);
      font-weight: bold;
      line-height: 1;
      color: #1e293b;
      white-space: nowrap;
    }

    .title {
      font-size: clamp(12px, 2.5vw, 20px);
      font-weight: 600;
      color: #1e293b;
      white-space: nowrap;
    }

    .label {
      font-size: clamp(10px, 2vw, 16px);
      color: #1e293b;
      opacity: 0.8;
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
    }
  </style>
</head>

<body>

  <div class="wrapper">
    <div class="title" id="title"></div>
    <div class="number" id="count">—</div>
    <div class="label" id="label">Visitors</div>
  </div>

  <script>

    const params = new URLSearchParams(window.location.search);

    // Yes I know please do not spam my upstash, this just a simple counter
    const OWNER_ENDPOINT = 'https://real-snake-87326.upstash.io';
    const OWNER_TOKEN    = 'gQAAAAAAAVUeAAIgcDIzMDgyNzNkOTU0Yzk0MDQ3YmVkZDdmYmRmZjAzZmE4OQ';

    function getHostFromReferrer() {
      try {
        const ref = document.referrer;
        if (!ref) return null;
        return new URL(ref).hostname.replace(/^www\./, '');
      } catch {
        return null;
      }
    }

    function slugify(text) {
      return text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    const host        = getHostFromReferrer();
    const counterName = params.get('name') || (host ? `visits-${slugify(host)}` : 'visits-default');
    const color       = params.get('color') || '#1e293b';
    const label       = params.get('label') || 'Visitors';
    const title       = params.get('title') || '';

    const titleEl = document.getElementById('title');
    if (title) {
      titleEl.textContent = title;
      titleEl.style.color = color;
    } else {
      titleEl.style.display = 'none';
    }

    document.getElementById('label').textContent = label;
    document.getElementById('count').style.color = color;
    document.getElementById('label').style.color = color;

    fetch(`${OWNER_ENDPOINT}/incr/${counterName}`, {
      headers: {
        'Authorization': `Bearer ${OWNER_TOKEN}`
      }
    })
      .then(response => {
        if (!response.ok) throw new Error('Network response was not ok');
        return response.json();
      })
      .then(data => {
        const value = typeof data.result === 'number' ? data.result : (typeof data === 'number' ? data : '—');
        document.getElementById('count').textContent = value;
      })
      .catch(() => {
        document.getElementById('count').textContent = '—';
      });

  </script>

</body>

</html>
