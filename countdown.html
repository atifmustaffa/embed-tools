<!DOCTYPE html>
<html lang="ms">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Embed</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      /* Scale everything as one unit based on container width */
      width: 100%;
      padding: 16px;
    }

    .title {
      font-size: clamp(16px, 4.5vw, 42px);
      font-weight: bold;
      line-height: 1.2;
      color: #1e293b;
      white-space: nowrap;          /* never wrap */
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .countdown {
      display: flex;
      justify-content: center;
      align-items: stretch;
      gap: clamp(6px, 1.5vw, 16px);
      flex-wrap: nowrap;            /* cards always on one row */
      width: 100%;
      max-width: 100%;
    }

    .card {
      background: #1e293b;
      color: white;
      flex: 1 1 0;                  /* all cards equal width, shrink together */
      min-width: 0;                 /* allow flex to shrink below content */
      padding: clamp(10px, 2vw, 22px) clamp(8px, 1.5vw, 18px);
      border-radius: clamp(8px, 1.5vw, 14px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .number {
      font-size: clamp(18px, 5.5vw, 48px);
      font-weight: bold;
      line-height: 1;
      white-space: nowrap;
    }

    .label {
      margin-top: clamp(4px, 0.8vw, 10px);
      font-size: clamp(9px, 1.4vw, 14px);
      opacity: 0.85;
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
    }
  </style>
</head>

<body>

  <div class="wrapper">

    <div class="title" id="event-title">
      Loading...
    </div>

    <div class="countdown">

      <div class="card">
        <div class="number" id="days">00</div>
        <div class="label">Hari</div>
      </div>

      <div class="card">
        <div class="number" id="hours">00</div>
        <div class="label">Jam</div>
      </div>

      <div class="card">
        <div class="number" id="minutes">00</div>
        <div class="label">Minit</div>
      </div>

      <div class="card">
        <div class="number" id="seconds">00</div>
        <div class="label">Saat</div>
      </div>

    </div>

  </div>

  <script>

    const params = new URLSearchParams(window.location.search);

    const eventTitle =
      params.get('title') ||
      'Event Countdown';

    const eventDate =
      params.get('date') ||
      '2026-06-01T09:00:00';

    const eventColor =
      params.get('color') ||
      '#1e293b';

    const eventLang =
      (params.get('lang') || 'ms').toLowerCase() === 'ms' ? 'ms' : 'en';

    const labels = {
      en: ['Days',  'Hours', 'Minutes','Seconds'],
      ms: ['Hari',  'Jam',   'Minit',  'Saat'],
    };

    // Apply color to cards and title
    document.querySelectorAll('.card').forEach(el => {
      el.style.background = eventColor;
    });
    document.getElementById('event-title').style.color = eventColor;

    // Apply language labels
    const langLabels = labels[eventLang];
    document.querySelectorAll('.label').forEach((el, i) => {
      el.textContent = langLabels[i];
    });

    document.getElementById('event-title').textContent = eventTitle;

    const targetDate = new Date(eventDate).getTime();

    function updateCountdown() {

      const now = Date.now();
      const distance = targetDate - now;

      if (distance <= 0) {
        ['days','hours','minutes','seconds'].forEach(id => {
          document.getElementById(id).textContent = '00';
        });
        return;
      }

      const days    = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours   = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);

      document.getElementById('days').textContent    = String(days).padStart(2, '0');
      document.getElementById('hours').textContent   = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');

    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

  </script>

</body>

</html>
